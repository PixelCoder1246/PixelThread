name: Linting

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [client, server]
    
    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.directory }}/package-lock.json'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run lint
        run: npm run lint
